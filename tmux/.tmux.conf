# --- General Settings ---
set -g default-terminal "screen-256color"
set -g mouse off


# --- Seamless Vim/TMUX Navigation ---
# Allows Ctrl-h/j/k/l to navigate both Tmux panes and Neovim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# --- Vim-Style Pane Management (prefix-based) ---
# Navigate panes with h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with - and |, open in current directory
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Resize panes with H/J/K/L
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Fast reload of tmux config
bind r source-file ~/.tmux.conf \; display "Tmux configuration reloaded!"

# --- Status Bar ---
set -g status-right '#h [#W] (#S)   %Y-%m-%d %H:%M' 
